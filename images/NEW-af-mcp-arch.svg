<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 372" font-family="Inter, Helvetica, sans-serif" role="img" aria-label="Credential-brokered MCP gateway architecture">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5C0000"/>
    </marker>
  </defs>

  <!-- LLM client -->
  <rect x="400" y="6" width="320" height="48" rx="9" fill="#2D3748"/>
  <text x="560" y="27" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="600">LLM client</text>
  <text x="560" y="44" text-anchor="middle" fill="#CBD2DC" font-size="11.5">Claude Code · Cursor · web chat · phone</text>

  <!-- client -> front door -->
  <line x1="560" y1="54" x2="560" y2="84" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="574" y="73" fill="#6B6B6B" font-size="11.5" font-style="italic">holds only a short-lived bearer token — never raw x509/IAM</text>

  <!-- front door -->
  <rect x="372" y="86" width="376" height="54" rx="9" fill="#800000"/>
  <text x="560" y="108" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="600">mcp.af.uchicago.edu</text>
  <text x="560" y="127" text-anchor="middle" fill="#F0DADA" font-size="11.5">oauth2-proxy → Keycloak OIDC</text>

  <!-- front door -> broker -->
  <line x1="560" y1="140" x2="560" y2="168" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- broker boundary -->
  <rect x="206" y="170" width="708" height="96" rx="11" fill="#e4f0f1" stroke="#800000" stroke-width="2.5"/>
  <text x="560" y="196" text-anchor="middle" fill="#1A1A1A" font-size="15.5" font-weight="700">FastMCP aggregator + AF credential broker</text>
  <!-- four duties as pills -->
  <g font-size="12.5" font-weight="600" fill="#1F6F78">
    <rect x="248" y="216" width="124" height="34" rx="17" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.3"/>
    <text x="310" y="238" text-anchor="middle">Identity</text>
    <rect x="392" y="216" width="124" height="34" rx="17" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.3"/>
    <text x="454" y="238" text-anchor="middle">AuthZ</text>
    <rect x="536" y="216" width="196" height="34" rx="17" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.3"/>
    <text x="634" y="238" text-anchor="middle">Credential brokering</text>
    <rect x="752" y="216" width="124" height="34" rx="17" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.3"/>
    <text x="814" y="238" text-anchor="middle">Audit</text>
  </g>

  <!-- broker -> bus -->
  <line x1="560" y1="266" x2="560" y2="286" stroke="#5C0000" stroke-width="2"/>
  <!-- distribution bus -->
  <line x1="110" y1="286" x2="1010" y2="286" stroke="#5C0000" stroke-width="2"/>

  <!-- backends: drops + pills -->
  <g font-size="13" font-weight="600" fill="#1F6F78">
    <!-- Rucio -->
    <line x1="110" y1="286" x2="110" y2="304" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="40" y="306" width="140" height="48" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="110" y="335" text-anchor="middle">Rucio</text>
    <!-- PanDA -->
    <line x1="260" y1="286" x2="260" y2="304" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="190" y="306" width="140" height="48" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="260" y="335" text-anchor="middle">PanDA</text>
    <!-- AMI -->
    <line x1="410" y1="286" x2="410" y2="304" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="340" y="306" width="140" height="48" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="410" y="335" text-anchor="middle">AMI / metadata</text>
    <!-- GitLab -->
    <line x1="560" y1="286" x2="560" y2="304" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="490" y="306" width="140" height="48" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="560" y="335" text-anchor="middle">GitLab</text>
    <!-- Jupyter -->
    <line x1="710" y1="286" x2="710" y2="304" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="640" y="306" width="140" height="48" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="710" y="335" text-anchor="middle">Jupyter</text>
    <!-- HTCondor -->
    <line x1="860" y1="286" x2="860" y2="304" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="790" y="306" width="140" height="48" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="860" y="335" text-anchor="middle">HTCondor</text>
    <!-- Nth backend -->
    <line x1="1010" y1="286" x2="1010" y2="304" stroke="#6B6B6B" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    <rect x="940" y="306" width="140" height="48" rx="9" fill="#FCFBF9" stroke="#6B6B6B" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="1010" y="329" text-anchor="middle" fill="#6B6B6B" font-size="12">Nth backend</text>
    <text x="1010" y="345" text-anchor="middle" fill="#6B6B6B" font-size="10.5" font-weight="400">no code change</text>
  </g>
</svg>
