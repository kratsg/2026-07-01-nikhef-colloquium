<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 374" font-family="Inter, Helvetica, sans-serif" role="img" aria-label="Credential-brokered MCP gateway architecture">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5C0000"/>
    </marker>
  </defs>

  <!-- LLM client -->
  <rect x="420" y="6" width="340" height="46" rx="9" fill="#2D3748"/>
  <text x="590" y="34" text-anchor="middle" fill="#FFFFFF" font-size="14.5" font-weight="600">Claude / Gemini / any MCP client</text>

  <!-- client -> front door -->
  <line x1="590" y1="52" x2="590" y2="82" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="604" y="71" fill="#6B6B6B" font-size="11.5" font-style="italic">holds only a short-lived bearer token — never raw x509/IAM</text>

  <!-- front door -->
  <rect x="400" y="84" width="380" height="52" rx="9" fill="#800000"/>
  <text x="590" y="105" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="600">mcp.af.uchicago.edu</text>
  <text x="590" y="124" text-anchor="middle" fill="#F0DADA" font-size="11.5">oauth2-proxy → AF Keycloak OIDC</text>

  <!-- front door -> broker -->
  <line x1="590" y1="136" x2="590" y2="166" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- broker boundary -->
  <rect x="220" y="168" width="740" height="100" rx="11" fill="#e4f0f1" stroke="#800000" stroke-width="2.5"/>
  <text x="590" y="192" text-anchor="middle" fill="#1A1A1A" font-size="15.5" font-weight="700">FastMCP aggregator + AF credential broker</text>
  <text x="590" y="209" text-anchor="middle" fill="#6B6B6B" font-size="11">FastAPI /v1 HTTP API</text>
  <g font-size="12.5" font-weight="600" fill="#1F6F78">
    <rect x="298" y="220" width="120" height="32" rx="16" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.3"/>
    <text x="358" y="241" text-anchor="middle">Identity</text>
    <rect x="436" y="220" width="110" height="32" rx="16" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.3"/>
    <text x="491" y="241" text-anchor="middle">AuthZ</text>
    <rect x="564" y="220" width="190" height="32" rx="16" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.3"/>
    <text x="659" y="241" text-anchor="middle">Credential brokering</text>
    <rect x="772" y="220" width="110" height="32" rx="16" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.3"/>
    <text x="827" y="241" text-anchor="middle">Audit</text>
  </g>

  <!-- broker -> bus -->
  <line x1="590" y1="268" x2="590" y2="288" stroke="#5C0000" stroke-width="2"/>
  <line x1="90" y1="288" x2="1090" y2="288" stroke="#5C0000" stroke-width="2"/>

  <!-- backends: 7 named + Nth -->
  <g font-size="12.5" font-weight="600" fill="#1F6F78" text-anchor="middle">
    <line x1="90" y1="288" x2="90" y2="306" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="24" y="308" width="132" height="46" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="90" y="336">rucio-mcp</text>

    <line x1="233" y1="288" x2="233" y2="306" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="167" y="308" width="132" height="46" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="233" y="336">ami-mcp</text>

    <line x1="376" y1="288" x2="376" y2="306" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="310" y="308" width="132" height="46" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="376" y="336">openmagic</text>

    <line x1="519" y1="288" x2="519" y2="306" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="453" y="308" width="132" height="46" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="519" y="336">panda-mcp</text>

    <line x1="661" y1="288" x2="661" y2="306" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="595" y="308" width="132" height="46" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="661" y="336">condor-mcp</text>

    <line x1="804" y1="288" x2="804" y2="306" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="738" y="308" width="132" height="46" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="804" y="336">gitlab-mcp</text>

    <line x1="947" y1="288" x2="947" y2="306" stroke="#5C0000" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="881" y="308" width="132" height="46" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="1.5"/>
    <text x="947" y="336">jupyter-ctl</text>

    <line x1="1090" y1="288" x2="1090" y2="306" stroke="#6B6B6B" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    <rect x="1024" y="308" width="132" height="46" rx="9" fill="#FCFBF9" stroke="#6B6B6B" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="1090" y="330" fill="#6B6B6B" font-size="12">Nth backend</text>
    <text x="1090" y="346" fill="#6B6B6B" font-size="10" font-weight="400">no code change</text>
  </g>
</svg>
